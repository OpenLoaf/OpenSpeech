name: Release

# 触发方式：本地 `pnpm version <major|minor|patch>` 会自动改 package.json + Cargo.toml
# 并 commit + 打 tag；`git push && git push --tags` 之后这条 workflow 被 `v*` tag 触发。
#
# 首次启用前必做（一次性）：
# 1. `pnpm tauri signer generate -w ~/.tauri/openspeech.key` 生成签名密钥
# 2. 把输出的 pub key 贴到 src-tauri/tauri.conf.json → plugins.updater.pubkey
# 3. 把 ~/.tauri/openspeech.key 的内容和设置时的密码配到 GitHub → Settings → Secrets:
#    - TAURI_SIGNING_PRIVATE_KEY           (整个 key 文件内容)
#    - TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (生成时输入的密码，无密码就留空)
#
# 构建矩阵（6 个 target，全部为 native 构建，不走 cross-compile）：
#   | 平台           | runner              | Rust target                 |
#   | macOS ARM64   | macos-latest         | aarch64-apple-darwin        |
#   | macOS Intel   | macos-13             | x86_64-apple-darwin         |
#   | Linux x86_64  | ubuntu-22.04         | x86_64-unknown-linux-gnu    |
#   | Linux ARM64   | ubuntu-22.04-arm     | aarch64-unknown-linux-gnu   |
#   | Windows x64   | windows-latest       | x86_64-pc-windows-msvc      |
#   | Windows ARM64 | windows-11-arm       | aarch64-pc-windows-msvc     |
#
# 产物：每个 target 的 installer（.app.tar.gz / .AppImage.tar.gz / .nsis.zip）+ 对应
# .sig 签名 + latest.json（tauri-action 按 platform-arch 合并到同一个 draft Release），
# 发布为 **draft** Release。确认无误后在 GitHub UI 手动点 "Publish release"，客户端的
# updater 才会看见新版本。
#
# GitHub 官方 ARM runner（`ubuntu-22.04-arm` / `windows-11-arm`）在 2025 年 GA。
# 如果未来某个 job 因 runner 未启用 / 配额不足跑不起来，可以临时改成 cross-compile：
# 把 platform 换回 x86_64 host，在 args 里追加 `--target <arm target>`，并在 dtolnay
# action 的 targets 里装上对应 target。

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- macOS ----
          - name: macOS ARM64
            platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - name: macOS Intel
            platform: macos-13
            rust-target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'

          # ---- Linux ----
          - name: Linux x86_64
            platform: ubuntu-22.04
            rust-target: ''
            args: ''
          - name: Linux ARM64
            platform: ubuntu-22.04-arm
            rust-target: ''
            args: ''

          # ---- Windows ----
          - name: Windows x86_64
            platform: windows-latest
            rust-target: ''
            args: ''
          - name: Windows ARM64
            platform: windows-11-arm
            rust-target: ''
            args: ''

    name: Build · ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          # target + platform 一起进 key，避免 x86_64 缓存污染 arm64 构建（rust-cache
          # 默认已按 host 分，这里显式加 target 做双保险）。
          key: ${{ matrix.rust-target || matrix.platform }}

      # Tauri 2 的 Linux bundler 要产出 **deb + rpm + AppImage** 三种包（由
      # `bundle.targets: "all"` 控制），需要一套比纯运行时依赖更完整的工具链：
      #   - 运行时/编译：webkit2gtk-4.1（不是 4.0）、gtk-3、ayatana appindicator、librsvg2、openssl
      #   - 音频：libasound2-dev（cpal 经 alsa-sys 要求 alsa.pc，缺则 build.rs 直接 panic）
      #   - 打包：patchelf（AppImage 动态库路径修复）、rpm（rpmbuild 生成 .rpm）、fakeroot
      #   - AppImage 下载执行：file、wget、libfuse2（Ubuntu 22.04 默认自带，22.04-arm 显式装一遍保险）
      # x86_64 和 arm64 的 apt 包名一致，Ubuntu 按当前架构自动解析 arm64 版本。
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev \
            patchelf \
            rpm \
            fakeroot \
            file \
            wget \
            libfuse2

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS 代码签名 + 公证（env 只在 macOS runner 上真正生效，其它平台 tauri-action
          # 忽略；所有 secrets 为空时自动跳过签名回退到未签名包）。
          #
          # GitHub Secrets 命名跟 OpenLoaf 仓库对齐（同一个 Apple Developer 账户跨项目复用）：
          #   MAC_CER_BASE64             = Developer ID Application 证书 .p12 的 base64
          #   MAC_CER_PASSWORD           = 上述 .p12 的导出密码
          #   APPLE_SIGNING_IDENTITY     = "Developer ID Application: 你的名字 (TEAMID)"（Tauri 独有）
          #   APPLE_ID                   = Apple ID 邮箱
          #   APPLE_APP_SPECIFIC_PASSWORD= App-Specific Password（appleid.apple.com 生成）
          #   APPLE_TEAM_ID              = 10 位 Team ID
          #
          # 右侧是 tauri-action / Tauri CLI 认的 env 名，左侧是 GitHub Secrets 名——这一层映射
          # 让 OpenSpeech 可以跟 OpenLoaf（electron-builder，认 CSC_LINK/CSC_KEY_PASSWORD）
          # 共用同一个 Secrets 池。
          APPLE_CERTIFICATE: ${{ secrets.MAC_CER_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CER_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenSpeech ${{ github.ref_name }}'
          releaseBody: |
            Auto-generated release for **${{ github.ref_name }}**.

            Downloads below cover six targets (macOS ARM64 / macOS Intel /
            Linux x86_64 / Linux ARM64 / Windows x86_64 / Windows ARM64).
            The in-app auto-updater will pick up the matching binary once this
            draft is published.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true
