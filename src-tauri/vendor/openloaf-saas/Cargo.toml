[package]
name = "openloaf-saas"
version = "0.3.0"
edition = "2024"
license = "MIT"
description = "OpenLoaf SaaS Rust SDK (safe wrapper over prebuilt static library)"
authors = ["OpenLoaf <dev@openloaf.com>"]
readme = "README.md"
publish = false

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
# 关键逻辑：realtime 工具走 WebSocket，直接在 wrapper 层使用 tungstenite，避免扩展 FFI
tungstenite = { version = "0.24", default-features = false, features = ["handshake", "rustls-tls-webpki-roots"] }
url = "2"

[dev-dependencies]
# 示例用
